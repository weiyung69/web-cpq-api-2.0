<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CPQ - Smart Quote</title>
    <style>
        /* --- 核心视觉设计：完全不影响 JS 逻辑 --- */
        :root { 
            --azure-blue: #3a3a3a; /* 改为深色主色调 */
            --bg: #f8f5f2;         /* 奶杏色底色 */
            --border: #f1ede8; 
            --text: #3a3a3a;       /* 暖碳灰 */
            --accent-orange: #e9bc99; 
            --accent-blue: #b1ccd3;   
            --accent-green: #c5d9c5;  
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); letter-spacing: 0.01em; }

        .navbar { background: white; color: var(--text); padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 5px rgba(0,0,0,0.05); border-bottom: 1px solid #eee; }
        .navbar b { font-size: 17px; font-weight: 700; }
        .lang-btn { background: #f1f1f1; border: none; color: #888; margin-left: 5px; padding: 5px 10px; cursor: pointer; font-size: 11px; border-radius: 6px; font-weight: 700; }
        .lang-btn.active { background: var(--text); color: white; }

        .main-layout { max-width: 1200px; margin: 25px auto; display: grid; grid-template-columns: 1fr 380px; gap: 25px; padding: 0 15px; }
        @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } }

        /* 重点：垂直线条容器 */
        .section-container {
            position: relative;
            padding-left: 20px; 
            margin-bottom: 35px;
        }
        .section-container::before {
            content: "";
            position: absolute;
            left: 0;
            top: 5px;
            bottom: 5px;
            width: 5px;
            border-radius: 10px;
            background: var(--accent-orange);
        }
        /* 为不同区域分配颜色 */
        .sec-plan::before { background: var(--accent-blue); }
        .sec-type::before { background: var(--accent-green); }
        .sec-option::before { background: var(--accent-orange); }

        .panel { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .step-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .section-title { font-size: 13px; font-weight: 800; color: #bbb; text-transform: uppercase; margin: 0; letter-spacing: 0.1em; }

        /* 选项卡片美化 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; margin-bottom: 10px; }
        .card { 
            border: 1px solid #f2f2f2; padding: 22px 15px; border-radius: 16px; 
            text-align: center; cursor: pointer; background: #fafafa; 
            transition: all 0.25s ease; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 115px; 
        }
        .card:hover { transform: translateY(-3px); background: #f5f5f5; }
        .card.active { border: 2px solid var(--text); background: #fff; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        .card.active::after { content: "●"; position: absolute; top: 8px; right: 12px; color: var(--text); font-size: 10px; }
        
        .card-emoji { font-size: 34px; margin-bottom: 8px; }
        .card-text { font-size: 13px; font-weight: 700; color: #555; }

        input { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 12px; font-size: 15px; margin-bottom: 12px; background: #fdfdfd; }
        input:focus { outline: none; border-color: var(--accent-orange); background: white; }
        
        .qty-row { display: flex; align-items: center; gap: 15px; margin-top: 15px; padding: 18px; background: #fafafa; border-radius: 15px; }
        .qty-btn { width: 34px; height: 34px; border: none; background: white; cursor: pointer; border-radius: 10px; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; }
        .qty-val { font-size: 18px; font-weight: 800; min-width: 30px; text-align: center; }

        .sidebar { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); position: sticky; top: 100px; }
        .cart-item { background: #fdfdfd; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #f8f8f8; }
        .remove-btn { color: #ccc; border: none; background: none; font-size: 20px; cursor: pointer; }

        .price-preview { background: #fdfaf7; border-radius: 15px; padding: 20px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #999; }
        .grand-total { font-size: 24px; font-weight: 800; color: #333; border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; }

        /* 按钮深色主色调 */
        .btn { width: 100%; border: none; padding: 18px; border-radius: 15px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-add { background: var(--text); color: white; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-submit { background: #222; color: white; margin-top: 15px; }
        .btn:disabled { background: #f0f0f0; color: #ccc; cursor: not-allowed; box-shadow: none; }

        .checkbox-container {   display: flex;   justify-content: flex-start;   align-items: center;   gap: 10px;  margin-top: 20px;   font-size: 12px;   color: #aaa;}
    </style>
</head>
<body>

<div class="navbar">
    <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size: 30px;">🏢</span> <b id="brand-text">Quote System</b>
    </div>
    <div class="lang-bar" id="langs"></div>
</div>

<div class="main-layout">
    <div class="panel">
        <div class="section-container">
            <div class="step-row"><div class="section-title" id="t-info-label">Client Info</div></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="cust-name">
                <input type="text" id="cust-phone" inputmode="tel">
            </div>
            <input type="email" id="cust-email">
        </div>

        <div class="section-container sec-plan">
            <div class="step-row"><div class="section-title" id="t-plan-label">Service Plan</div></div>
            <div class="grid" id="cat-grid"></div>
        </div>

        <div class="section-container sec-type">
            <div class="step-row"><div class="section-title" id="t-type-label">Identity</div></div>
            <div class="grid" id="seg-grid"></div>
        </div>

        <div id="item-section" style="display:none;" class="section-container sec-option">
            <div class="step-row"><div class="section-title" id="t-option-label">Selection</div></div>
            <div class="grid" id="item-grid"></div>
        </div>

        <div id="price-box" style="display:none; flex-direction: column; gap: 10px;">
            <div class="qty-row">
                <span style="font-weight:700; font-size:12px; flex:1; color:#999;" id="t-qty-label">QUANTITY</span>
                <button class="qty-btn" onclick="updateQty(-1)">−</button>
                <span class="qty-val" id="qty-display">1</span>
                <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>
            <div class="price-preview">
                <span style="font-weight:700; font-size:12px; color:#bbb;" id="t-preview-label">ESTIMATED TOTAL</span>
                <b id="preview-val" style="font-size:22px;">--</b>
            </div>
        </div>

        <button class="btn btn-add" id="btn-add" onclick="addToCart()" disabled>+ Add to Estimate</button>
    </div>

    <div class="sidebar">
        <div class="section-title" id="t-cart-title" style="margin-bottom:25px; color:var(--text); border-bottom: 2px solid #f8f8f8; padding-bottom: 10px;">🛒 Estimate Summary</div>
        <div id="cart-list"></div>
        <div id="empty-msg" style="text-align:center; padding:40px 0; color:#ddd; font-size:13px;">No services added yet.</div>
        
        <div id="summary-area" style="display:none;">
            <div class="summary">
                <div class="summary-line"><span id="t-subtotal">Subtotal</span><span id="sum-sub" style="font-weight:700; color:#333;">--</span></div>
                <div class="summary-line"><span><span id="t-tax">Tax</span> (<span id="sum-tax-rate">0</span>%)</span><span id="sum-tax-amt" style="font-weight:700; color:#333;">--</span></div>
                <div class="summary-line grand-total"><span id="t-total">Total</span><span id="sum-total">--</span></div>
            </div>

            <label class="checkbox-container">
                <input type="checkbox" id="agree-checkbox" onchange="toggleSubmitButton()">
                <span id="t-checkbox-label">I confirm the details above are correct.</span>
            </label>

            <button class="btn btn-submit" id="t-submit-btn" onclick="doSubmit()" disabled>Generate & Print PDF</button>
        </div>
    </div>
</div>

<script>
    const API = "https://web-cpq-api-2-htbgcafubqgjc9hb.malaysiawest-01.azurewebsites.net/api.php";
    let db = { cpq: null, langs: null };
    let state = { lang: 'en', cat: null, seg: null, item: null, qty: 1 };
    let cart = [];

    async function init() {
        const t_now = Date.now();
        const [r1, r2] = await Promise.all([fetch(`${API}?type=cpq&t=${t_now}`), fetch(`${API}?type=langs&t=${t_now}`)]);
        db.cpq = await r1.json(); db.langs = await r2.json();
        state.lang = db.cpq.settings.langs[0];
        renderLangs(); updateUI();
    }

    function t(key, fb) { return (db.langs[key] && db.langs[key][state.lang]) ? db.langs[key][state.lang] : (fb || key); }
    
    function createCardHTML(text, isActive, clickFn) {
        const emojiRegex = /^(\u00a9|\u00ae|[\u2000-\u3300]|\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff])/;
        let emoji = "😊"; 
        let label = text;
        if (emojiRegex.test(text)) {
            const parts = text.split(' ');
            emoji = parts[0];
            label = parts.slice(1).join(' ');
        }
        return `<div class="card ${isActive ? 'active' : ''}" onclick="${clickFn}"><div class="card-emoji">${emoji}</div><div class="card-text">${label}</div></div>`;
    }

    function renderLangs() { document.getElementById('langs').innerHTML = db.cpq.settings.langs.map(l => `<button class="lang-btn ${l===state.lang?'active':''}" onclick="changeLang('${l}')">${l.toUpperCase()}</button>`).join(''); }
    function changeLang(l) { state.lang = l; renderLangs(); updateUI(); renderCart(); }

    function updateUI() {
        document.getElementById('brand-text').innerText = db.cpq.settings.brand_name;
        document.getElementById('t-info-label').innerText = t('UI_NAME_LABEL');
        document.getElementById('t-plan-label').innerText = t('UI_SELECT_PLAN');
        document.getElementById('t-type-label').innerText = t('UI_SELECT_TYPE');
        document.getElementById('t-option-label').innerText = t('UI_SELECT_OPTION');
        document.getElementById('cust-name').placeholder = t('UI_NAME_LABEL');
        document.getElementById('cust-phone').placeholder = t('UI_PHONE_LABEL');
        document.getElementById('cust-email').placeholder = t('UI_EMAIL_LABEL');
        document.getElementById('t-cart-title').innerText = t('UI_TITLE');
        document.getElementById('t-total').innerText = t('UI_TOTAL');
        document.getElementById('t-preview-label').innerText = t('UI_TOTAL');
        document.getElementById('t-submit-btn').innerText = t('UI_SUBMIT');
        document.getElementById('t-checkbox-label').innerText = t('UI_checkbox', 'I confirm the details above are correct.');
        
        const uiText = {
            en: { qty: "QUANTITY", add: "+ Add to Estimate", empty: "No services added yet.", sub: "Subtotal", tax: "Tax" },
            cn: { qty: "选择数量", add: "+ 添加到预估", empty: "尚未选择服务", sub: "小计", tax: "税额" },
            ms: { qty: "KUANTITI", add: "+ Tambah ke Anggaran", empty: "Tiada perkhidmatan dipilih.", sub: "Subjumlah", tax: "Cukai" }
        };
        const langPack = uiText[state.lang] || uiText.en;
        document.getElementById('t-qty-label').innerText = langPack.qty;
        document.getElementById('btn-add').innerText = langPack.add;
        document.getElementById('empty-msg').innerText = langPack.empty;
        document.getElementById('t-subtotal').innerText = langPack.sub;
        document.getElementById('t-tax').innerText = langPack.tax;

        document.getElementById('cat-grid').innerHTML = Object.values(db.cpq.catalog).sort((a,b)=>a.sort-b.sort).map(p => createCardHTML(t(p.i18n), state.cat === p.i18n, `select('cat', '${p.i18n}')`)).join('');
        const selectedProd = Object.values(db.cpq.catalog).find(p => p.i18n === state.cat);
        const segGrid = document.getElementById('seg-grid');
        if (state.cat && selectedProd) {
            segGrid.innerHTML = selectedProd.segments.map(s => createCardHTML(t(s), state.seg === s, `select('seg', '${s}')`)).join('');
        } else { segGrid.innerHTML = `<div style="grid-column:1/-1; color:#999; text-align:center; padding:10px;">Select Plan First</div>`; }

        const itemSec = document.getElementById('item-section');
        if (state.cat && state.seg && selectedProd) {
            itemSec.style.display = 'block';
            document.getElementById('item-grid').innerHTML = Object.keys(selectedProd.items).map(k => createCardHTML(k, state.item === k, `select('item', '${k}')`)).join('');
        } else { itemSec.style.display = 'none'; }

        const priceBox = document.getElementById('price-box');
        if (state.cat && state.seg && state.item && selectedProd) {
            priceBox.style.display = 'flex';
            const unitPrice = selectedProd.items[state.item];
            document.getElementById('preview-val').innerText = `${db.cpq.settings.currency} ${(unitPrice * state.qty).toLocaleString()}`;
            document.getElementById('btn-add').disabled = false;
        } else { priceBox.style.display = 'none'; document.getElementById('btn-add').disabled = true; }
    }

    function select(type, val) { 
        state[type] = val; 
        if(type==='cat'){ state.seg=null; state.item=null; } 
        if(type==='seg'){ state.item=null; } 
        state.qty = 1; document.getElementById('qty-display').innerText = 1;
        updateUI(); 
    }

    function updateQty(val) {
        state.qty = Math.max(1, state.qty + val);
        document.getElementById('qty-display').innerText = state.qty;
        updateUI();
    }

    function addToCart() {
        const prod = Object.values(db.cpq.catalog).find(p => p.i18n === state.cat);
        const unitPrice = prod.items[state.item];
        const itemDesc = t(state.cat);
        const itemOpt = state.item;
        const itemSeg = t(state.seg);
        const existing = cart.find(i => i.desc === itemDesc && i.opt === itemOpt && i.seg === itemSeg);
        if (existing) {
            existing.qty += state.qty;
            existing.line_total = existing.unit_price * existing.qty;
        } else {
            cart.push({ id: Date.now(), desc: itemDesc, opt: itemOpt, seg: itemSeg, unit_price: unitPrice, qty: state.qty, line_total: unitPrice * state.qty });
        }
        state.qty = 1; document.getElementById('qty-display').innerText = 1;
        renderCart(); updateUI();
    }

    function updateCartQty(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.qty = Math.max(1, item.qty + delta);
            item.line_total = item.unit_price * item.qty;
            renderCart();
        }
    }

    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); renderCart(); }

    function toggleSubmitButton() {
        const checkbox = document.getElementById('agree-checkbox');
        const submitBtn = document.getElementById('t-submit-btn');
        submitBtn.disabled = !checkbox.checked;
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const sumArea = document.getElementById('summary-area');
        const empty = document.getElementById('empty-msg');
        if (cart.length === 0) { 
            list.innerHTML = ""; 
            sumArea.style.display = 'none'; 
            empty.style.display = 'block'; 
            document.getElementById('agree-checkbox').checked = false;
            return; 
        }
        empty.style.display = 'none'; sumArea.style.display = 'block';
        const cur = db.cpq.settings.currency;
        
        list.innerHTML = cart.map(i => `
            <div class="cart-item">
                <div style="padding:12px; width:100%;">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${i.desc} (${i.opt})</b>
                        <button class="remove-btn" onclick="removeFromCart(${i.id})">×</button>
                    </div>
                    <small>${i.seg}</small>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                        <div style="display:flex; align-items:center; gap:8px; background:#f3f2f1; padding:2px 8px; border-radius:2px;">
                            <button onclick="updateCartQty(${i.id}, -1)" style="border:none; background:none; cursor:pointer; font-weight:bold;">-</button>
                            <span style="font-size:13px; font-weight:bold;">${i.qty}</span>
                            <button onclick="updateCartQty(${i.id}, 1)" style="border:none; background:none; cursor:pointer; font-weight:bold;">+</button>
                        </div>
                        <span style="font-weight:bold; color:var(--azure-blue);">${cur}${i.line_total.toLocaleString()}</span>
                    </div>
                </div>
            </div>
        `).join('');
        
        const sub = cart.reduce((a, i) => a + i.line_total, 0);
        const taxRate = parseFloat(db.cpq.settings.tax_rate) || 0;
        const taxAmt = sub * (taxRate / 100);
        document.getElementById('sum-sub').innerText = `${cur} ${sub.toLocaleString()}`;
        document.getElementById('sum-tax-rate').innerText = taxRate;
        document.getElementById('sum-tax-amt').innerText = `${cur} ${taxAmt.toLocaleString()}`;
        document.getElementById('sum-total').innerText = `${cur} ${(sub + taxAmt).toLocaleString()}`;
        toggleSubmitButton();
    }

    async function doSubmit() {
        const checkbox = document.getElementById('agree-checkbox');
        if(!checkbox || !checkbox.checked) return;
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        if(!name || !phone || cart.length === 0) return alert("Please fill Name & Phone");
        const order = { 
            name, phone, email: document.getElementById('cust-email').value, 
            items: cart.map(i => ({ desc: `${i.desc} (${i.opt})`, seg: i.seg, unit_price: i.unit_price, qty: i.qty, line_total: i.line_total })), 
            subtotal: document.getElementById('sum-sub').innerText, tax: document.getElementById('sum-tax-amt').innerText, 
            price: document.getElementById('sum-total').innerText, status: "pending", date: new Date().toISOString() 
        };
        const w = window.open('', '_blank');
        w.document.write(`<h1>Quotation Generated</h1><pre>${JSON.stringify(order, null, 2)}</pre>`);
        w.document.close();
        await fetch(`${API}?type=orders`, { method: 'POST', body: JSON.stringify(order) });
        alert(t('UI_SUCCESS')); 
        cart = []; checkbox.checked = false; renderCart(); window.scrollTo(0,0);
    }
    init();
</script>
</body>
</html>
