<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPQ Admin - Azure Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --azure: #0078d4; 
            --azure-light: #eff6fc;
            --bg: #f8f9fa; 
            --card-bg: #ffffff;
            --border: #edebe9; 
            --text-main: #323130;
            --text-secondary: #605e5c;
            --danger: #d13438; 
            --success: #107c10;
            --whatsapp: #25D366;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 40px 20px; 
            color: var(--text-main); 
            line-height: 1.6;
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: var(--shadow); 
        }

        /* Header 升级 */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--azure-light);
        }
        .header h2 { margin: 0; color: var(--azure); font-weight: 700; letter-spacing: -0.5px; }

        /* Dashboard 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--azure-light);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0,120,212,0.1);
        }
        .stat-card label { font-size: 12px; color: var(--azure); font-weight: 700; display: block; text-transform: uppercase; }
        .stat-card span { font-size: 24px; font-weight: 800; color: var(--text-main); }

        /* 配置栏美化 */
        .settings-bar { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            background: #fff; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 30px; 
            border: 1px solid var(--border);
        }
        .settings-bar label { display: block; font-size: 11px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
        .settings-bar input { 
            width: 100%; padding: 10px; border: 1px solid #d1d1d1; border-radius: 6px; 
            box-sizing: border-box; transition: all 0.2s; background: #fafafa;
        }
        .settings-bar input:focus { border-color: var(--azure); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(0,120,212,0.1); }

        /* Tab 切换动画 */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; background: #f3f2f1; padding: 5px; border-radius: 8px; }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; background: transparent; cursor: pointer; 
            font-weight: 600; border-radius: 6px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary);
        }
        .tab-btn.active { background: white; color: var(--azure); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .panel { display: none; animation: fadeIn 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 标签美化 */
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { 
            padding: 6px 16px; background: #fff; border-radius: 20px; font-size: 11px; 
            cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; font-weight: 600;
        }
        .tag:hover { border-color: var(--azure); background: var(--azure-light); }
        .tag.active { background: var(--azure); color: white; border-color: var(--azure); box-shadow: 0 4px 10px rgba(0,120,212,0.3); }

        /* 产品卡片美化 */
        .prod-card { 
            border: 1px solid var(--border); border-radius: 12px; padding: 25px; 
            margin-bottom: 25px; transition: all 0.3s;
        }
        .prod-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.05); border-color: #d1d1d1; }
        .prod-header { display: grid; grid-template-columns: 1.5fr 1fr 80px auto; gap: 20px; margin-bottom: 20px; align-items: end; }

        /* 表格升级 */
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #faf9f8; padding: 15px; border-bottom: 2px solid var(--border); font-size: 12px; text-transform: uppercase; color: var(--text-secondary); }
        td { padding: 15px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover td { background: #fdfdfd; }

        /* 按钮美化 */
        .btn { 
            padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; 
            font-weight: 700; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; 
        }
        .btn-primary { background: var(--azure); color: white; }
        .btn-primary:hover { background: #005a9e; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,120,212,0.3); }
        .btn-danger { color: var(--danger); background: #fde7e9; }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* 订单面板状态标签 */
        .status-pill {
            padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800;
        }
        .status-pending { background: #fff4ce; color: #857500; }
        .status-followed { background: #dff6dd; color: #107c10; }

        /* 固定页脚 */
        .footer { 
            position: sticky; bottom: 0; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); padding: 20px; border-top: 1px solid var(--border); 
            text-align: right; margin-top: 40px; z-index: 10; border-radius: 0 0 12px 12px;
        }
        
        .note-area { 
            background: #fffdf6; padding: 15px; border-radius: 8px; border-left: 4px solid #ffb900; margin-bottom: 25px; 
        }
        .note-area textarea { width: 100%; border: 1px solid #e1dfdd; background: transparent; padding: 10px; font-size: 13px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2><i class="fas fa-layer-group"></i> CPQ Manager Pro</h2>
            <div style="font-size:12px; color:#999; margin-top:4px;">Enterprise Azure Managed • v6.2 Premium</div>
        </div>
        <button class="btn btn-primary" onclick="saveToAzure()">
            <i class="fas fa-sync-alt"></i> SYNC TO AZURE
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <label>Brand Active</label>
            <span id="stat-brand">-</span>
        </div>
        <div class="stat-card" style="border-left: 4px solid var(--azure);">
            <label>Currency</label>
            <span id="stat-currency">-</span>
        </div>
        <div class="stat-card">
            <label>Monthly Target</label>
            <span id="month-total-v2">0</span>
        </div>
    </div>

    <div class="settings-bar">
        <div><label>LANGUAGES (CSV)</label><input type="text" id="conf-langs"></div>
        <div><label>CURRENCY</label><input type="text" id="conf-currency"></div>
        <div><label>TAX %</label><input type="number" id="conf-tax"></div>
        <div><label>BRAND IDENTITY</label><input type="text" id="conf-brand" oninput="document.getElementById('stat-brand').innerText=this.value"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('langs')"><i class="fas fa-language"></i> I18N Library</button>
        <button class="tab-btn" onclick="showTab('catalog')"><i class="fas fa-boxes"></i> Product Config</button>
        <button class="tab-btn" onclick="showTab('orders')"><i class="fas fa-shopping-cart"></i> Sales Orders</button>
    </div>

    <div id="panel-langs" class="panel active">
        <div class="note-area">
            <label>📝 LIBRARY NOTES</label>
            <textarea id="note-langs" rows="2"></textarea>
        </div>
        <table id="lang-table">
            <thead id="lang-head"></thead>
            <tbody id="lang-body"></tbody>
        </table>
        <button class="btn btn-primary" style="margin-top:20px;" onclick="addLibKey()">
            <i class="fas fa-plus"></i> Add New Key
        </button>
    </div>

    <div id="panel-catalog" class="panel">
        <div class="note-area">
            <label>📝 PRODUCT STRATEGY</label>
            <textarea id="note-catalog" rows="2"></textarea>
        </div>
        <div id="catalog-list"></div>
        <button class="btn btn-primary" style="width:100%; padding:20px; border:2px dashed var(--azure); background:transparent; color:var(--azure);" onclick="addProd()">
            <i class="fas fa-plus-circle"></i> Create New Product Category
        </button>
    </div>

    <div id="panel-orders" class="panel">
        <div class="note-area">
            <label>📝 SALES PERFORMANCE NOTE</label>
            <textarea id="note-orders" rows="2"></textarea>
        </div>
        <div style="background:#f3f2f1; padding:20px; border-radius:10px; margin-bottom:20px; display:flex; gap:15px; align-items:center;">
            <i class="fas fa-filter" style="color:var(--azure)"></i>
            <select id="sel-year" class="tab-btn" style="flex:none; width:120px; background:white;" onchange="renderOrders()"></select>
            <select id="sel-month" class="tab-btn" style="flex:none; width:120px; background:white;" onchange="renderOrders()"></select>
        </div>
        <div id="orders-list"></div>
    </div>

    <div class="footer">
        <span id="save-status" style="margin-right:20px; font-weight:bold; color:var(--success);"></span>
        <button class="btn btn-primary" style="padding:15px 40px; font-size:14px;" onclick="saveToAzure()">
            <i class="fas fa-cloud-upload-alt"></i> PUSH CHANGES TO CLOUD
        </button>
    </div>
</div>

<script>
    // 原有 API 逻辑保持不变
    const API_URL = "https://web-cpq-api-2-htbgcafubqgjc9hb.malaysiawest-01.azurewebsites.net/api.php";
    let cpq = { settings: { langs: [], currency: "$", tax_rate: 0, notes: {} }, catalog: {} };
    let langs = {};
    let orders = [];

    async function load() {
        const t = Date.now();
        const [r1, r2, r3] = await Promise.all([
            fetch(`${API_URL}?type=cpq&t=${t}`),
            fetch(`${API_URL}?type=langs&t=${t}`),
            fetch(`${API_URL}?type=orders&t=${t}`)
        ]);
        cpq = await r1.json(); 
        langs = await r2.json(); 
        orders = await r3.json() || []; 

        document.getElementById('conf-langs').value = cpq.settings.langs.join(',');
        document.getElementById('conf-currency').value = cpq.settings.currency;
        document.getElementById('conf-tax').value = cpq.settings.tax_rate;
        document.getElementById('conf-brand').value = cpq.settings.brand_name || "";
        
        // 更新 Dashboard 卡片
        document.getElementById('stat-brand').innerText = cpq.settings.brand_name || "N/A";
        document.getElementById('stat-currency').innerText = cpq.settings.currency;

        if(!cpq.settings.notes) cpq.settings.notes = {};
        document.getElementById('note-langs').value = cpq.settings.notes.langs || "";
        document.getElementById('note-catalog').value = cpq.settings.notes.catalog || "";
        document.getElementById('note-orders').value = cpq.settings.notes.orders || "";

        initOrderFilters(); renderLangs();
    }

    function showTab(id) {
        document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('panel-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'catalog') renderCatalog();
        if(id === 'orders') renderOrders();
    }

    function renderLangs() {
        const cols = cpq.settings.langs;
        document.getElementById('lang-head').innerHTML = `<tr><th>Key ID</th>${cols.map(c => `<th>${c.toUpperCase()}</th>`).join('')}<th style="width:50px"></th></tr>`;
        document.getElementById('lang-body').innerHTML = Object.keys(langs).map(k => `
            <tr>
                <td><input type="text" value="${k}" onblur="renameTag('${k}', this.value)" style="width:100%; border:none; font-weight:bold; background:transparent;"></td>
                ${cols.map(c => `<td><input type="text" value="${langs[k][c]||''}" onchange="langs['${k}']['${c}']=this.value" style="width:100%; border:none; background:transparent;"></td>`).join('')}
                <td><button class="btn-danger" onclick="deleteTag('${k}')" style="border:none; padding:5px 10px; border-radius:4px;"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
    }

    function addLibKey() { const k = prompt("Enter Key ID (e.g. CAT_NEW):"); if(k && !langs[k]) { langs[k]={}; renderLangs(); } }
    function deleteTag(k) { if(confirm("Are you sure?")) { delete langs[k]; renderLangs(); } }
    function renameTag(oldK, newK) { if(newK && newK!==oldK) { langs[newK]=langs[oldK]; delete langs[oldK]; renderLangs(); } }

    function renderCatalog() {
        const container = document.getElementById('catalog-list');
        container.innerHTML = "";
        const allSegTags = Object.keys(langs).filter(k => k.trim().toUpperCase().startsWith('SEG_'));
        
        Object.keys(cpq.catalog).sort((a,b)=>cpq.catalog[a].sort - cpq.catalog[b].sort).forEach(id => {
            const p = cpq.catalog[id];
            const card = document.createElement('div'); card.className = 'prod-card';
            const activeSegs = p.segments || [];

            card.innerHTML = `
                <div class="prod-header">
                    <div><label>PRODUCT ID</label><input type="text" value="${id}" onblur="renameProd('${id}', this.value)" style="width:100%; padding:8px; border-radius:4px; border:1px solid #ddd;"></div>
                    <div><label>I18N LABEL</label>
                        <select onchange="cpq.catalog['${id}'].i18n=this.value" style="width:100%; padding:8px; border-radius:4px; border:1px solid #ddd;">
                            ${Object.keys(langs).filter(k => k.startsWith('CAT_')).map(lk => `<option value="${lk}" ${lk==p.i18n?'selected':''}>${lk}</option>`).join('')}
                        </select>
                    </div>
                    <div><label>SORT</label><input type="number" value="${p.sort||0}" onchange="cpq.catalog['${id}'].sort=parseInt(this.value)" style="width:100%; padding:8px; border-radius:4px; border:1px solid #ddd;"></div>
                    <button class="btn btn-danger" onclick="deleteProd('${id}')"><i class="fas fa-trash"></i></button>
                </div>
                
                <div style="margin-bottom:20px;">
                    <label style="font-size:11px; font-weight:700; color:var(--text-secondary);">VISIBLE SEGMENTS:</label>
                    <div class="tag-container">
                        ${allSegTags.map(tag => `<div class="tag ${activeSegs.includes(tag)?'active':''}" onclick="toggleTag('${id}','${tag}')">${tag}</div>`).join('')}
                    </div>
                </div>

                <div id="items-${id}" style="border-top:1px solid #eee; padding-top:15px;">
                    ${Object.entries(p.items).map(([n,v]) => `
                        <div style="display:flex; gap:10px; margin-bottom:8px; align-items:center;">
                            <input type="text" value="${n}" onblur="renameSlot('${id}','${n}',this.value)" style="flex:2; padding:8px; border:1px solid #eee; border-radius:4px;">
                            <input type="number" value="${v}" onchange="cpq.catalog['${id}'].items['${n}']=parseInt(this.value)" style="flex:1; padding:8px; border:1px solid #eee; border-radius:4px;">
                            <button class="btn-danger" onclick="deleteSlot('${id}','${n}')" style="border:none; padding:5px 10px;">×</button>
                        </div>`).join('')}
                </div>
                <button class="btn btn-primary" style="font-size:11px; margin-top:10px; background:#fafafa; color:var(--azure); border:1px solid var(--azure);" onclick="addPriceSlot('${id}')">+ Add Price Option</button>
            `;
            container.appendChild(card);
        });
    }

    function toggleTag(pid, tag) {
        if(!cpq.catalog[pid].segments) cpq.catalog[pid].segments = [];
        let ts = cpq.catalog[pid].segments;
        cpq.catalog[pid].segments = ts.includes(tag) ? ts.filter(t => t !== tag) : [...ts, tag];
        renderCatalog(); 
    }

    function addProd() { const id = "p_"+Date.now().toString().slice(-4); cpq.catalog[id]={i18n:"",sort:9,segments:[],items:{"Standard Item":0}}; renderCatalog(); }
    function deleteProd(id) { if(confirm("Delete this product?")) { delete cpq.catalog[id]; renderCatalog(); } }
    function renameProd(old, next) { if(next && next!==old) { cpq.catalog[next]=cpq.catalog[old]; delete cpq.catalog[old]; renderCatalog(); } }
    function addPriceSlot(id) { const n=prompt("Item Name:"); if(n) { cpq.catalog[id].items[n]=0; renderCatalog(); } }
    function deleteSlot(id, s) { delete cpq.catalog[id].items[s]; renderCatalog(); }
    function renameSlot(id, old, next) { if(next && next!==old) { cpq.catalog[id].items[next]=cpq.catalog[id].items[old]; delete cpq.catalog[id].items[old]; renderCatalog(); } }

    function initOrderFilters() {
        const now = new Date();
        const sy = document.getElementById('sel-year'); const sm = document.getElementById('sel-month');
        sy.innerHTML = ""; sm.innerHTML = "";
        for(let i=0; i<3; i++) sy.innerHTML += `<option value="${now.getFullYear()-i}">${now.getFullYear()-i}</option>`;
        for(let i=1; i<=12; i++) sm.innerHTML += `<option value="${i}" ${i===(now.getMonth()+1)?'selected':''}>${i<10?'0'+i:i}</option>`;
    }

    function renderOrders() {
        const y = document.getElementById('sel-year').value;
        const m = document.getElementById('sel-month').value.padStart(2, '0');
        const container = document.getElementById('orders-list');
        let monthlySum = 0;
        const filtered = orders.filter(o => o.date && o.date.startsWith(`${y}-${m}`)).reverse();

        if(filtered.length === 0) {
            container.innerHTML = "<div style='text-align:center;padding:80px;color:#999;background:#fafafa;border-radius:10px;'>No orders recorded for this period.</div>";
            document.getElementById('month-total-v2').innerText = cpq.settings.currency + " 0";
            return;
        }

        container.innerHTML = `<table><thead><tr><th>Date</th><th>Customer</th><th>Product Details</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody>${filtered.map((o) => {
                const priceNum = parseFloat(o.price.replace(/[^0-9.]/g,'')) || 0;
                monthlySum += priceNum;
                const isFollowed = o.status === 'followed';
                const gmailLink = `https://mail.google.com/mail/?view=cm&fs=1&to=${o.email}&su=${encodeURIComponent('Quotation from ' + cpq.settings.brand_name)}`;
                return `<tr>
                    <td><span style="font-size:12px; color:#666;">${o.date.split('T')[0]}</span></td>
                    <td>
                        <div style="font-weight:700;">${o.name}</div>
                        <a href="https://wa.me/${o.phone}" target="_blank" style="color:var(--whatsapp); font-size:12px; text-decoration:none;"><i class="fab fa-whatsapp"></i> ${o.phone}</a>
                    </td>
                    <td style="font-size:13px;">${(o.items||[]).map(it => `<div>• ${it.desc} <span style="color:#999">x${it.qty}</span></div>`).join('')}</td>
                    <td style="font-weight:800; color:var(--azure);">${o.price}</td>
                    <td>
                        <button class="status-pill ${isFollowed?'status-followed':'status-pending'}" style="border:none; cursor:pointer;" onclick="toggleOrderStatus(${orders.indexOf(o)})">
                            ${isFollowed?'<i class="fas fa-check"></i> FOLLOWED':'<i class="fas fa-clock"></i> PENDING'}
                        </button>
                    </td>
                </tr>`;
            }).join('')}</tbody></table>`;
        document.getElementById('month-total-v2').innerText = cpq.settings.currency + " " + monthlySum.toLocaleString();
    }

    async function toggleOrderStatus(idx) {
        orders[idx].status = (orders[idx].status === 'followed') ? 'pending' : 'followed';
        renderOrders();
        await fetch(`${API_URL}?type=orders`, { method: "POST", body: JSON.stringify(orders) });
    }

    async function saveToAzure() {
        const btn = event.currentTarget; 
        const originalText = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SYNCING...';
        
        cpq.settings.langs = document.getElementById('conf-langs').value.split(',').map(s=>s.trim());
        cpq.settings.currency = document.getElementById('conf-currency').value;
        cpq.settings.tax_rate = parseFloat(document.getElementById('conf-tax').value);
        cpq.settings.brand_name = document.getElementById('conf-brand').value;
        cpq.settings.notes = { langs: document.getElementById('note-langs').value, catalog: document.getElementById('note-catalog').value, orders: document.getElementById('note-orders').value };
        
        await Promise.all([
            fetch(`${API_URL}?type=cpq`, { method: "POST", body: JSON.stringify(cpq) }),
            fetch(`${API_URL}?type=langs`, { method: "POST", body: JSON.stringify(langs) })
        ]);
        
        document.getElementById('save-status').innerText = "✓ SYNC SUCCESSFUL";
        btn.disabled = false; btn.innerHTML = originalText;
        setTimeout(()=>document.getElementById('save-status').innerText="", 3000);
    }
    load();
</script>
</body>
</html>
