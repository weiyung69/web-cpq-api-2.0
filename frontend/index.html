<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CPQ - Smart Quote</title>
    <style>
        /* --- 视觉校准：碳黑 + 奶杏色 + 垂直索引线 --- */
        :root { 
            --bg: #f8f5f2;         
            --panel-bg: #ffffff;
            --text-main: #3a3a3a;  
            --accent-orange: #e9bc99; 
            --accent-blue: #b1ccd3;   
            --accent-green: #c5d9c5;  
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Heiti SC', sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 0; 
            color: var(--text-main); 
            letter-spacing: 0.01em;
        }

        .navbar { 
            background: white; padding: 20px 24px; 
            display: flex; align-items: center; justify-content: space-between; 
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 1px 0 rgba(0,0,0,0.05);
        }
        .navbar b { font-size: 17px; font-weight: 700; }
        
        .lang-btn { 
            background: #f1f1f1; border: none; color: #888; 
            margin-left: 6px; padding: 6px 12px; cursor: pointer; 
            font-size: 11px; border-radius: 8px; font-weight: 700;
        }
        .lang-btn.active { background: var(--text-main); color: white; }

        .main-layout { max-width: 1150px; margin: 30px auto; display: grid; grid-template-columns: 1fr 380px; gap: 30px; padding: 0 20px; }
        @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } }

        .panel { 
            background: var(--panel-bg); padding: 35px; border-radius: 24px; box-shadow: var(--card-shadow); 
        }

        /* --- 核心改进：真正覆盖全区的垂直长线 --- */
        .section-container {
            position: relative;
            padding-left: 24px; 
            margin-bottom: 45px;
        }
        .section-container::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;  /* 确保垂直覆盖整个内容区 */
            width: 5px; 
            border-radius: 10px;
            background: var(--accent-orange);
        }
        /* 颜色区分 */
        .sec-info::before { background: #ddd; }
        .sec-plan::before { background: var(--accent-blue); }
        .sec-type::before { background: var(--accent-green); }
        .sec-option::before { background: var(--accent-orange); }

        .section-title { font-size: 14px; font-weight: 800; color: #a19f9d; margin-bottom: 20px; letter-spacing: 0.05em; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { 
            border: 1px solid #f2f2f2; padding: 24px 15px; border-radius: 16px; 
            text-align: center; cursor: pointer; background: #fafafa; 
            transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; 
        }
        .card:hover { transform: translateY(-4px); background: #f5f5f5; }
        .card.active { border-color: var(--text-main); background: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.06); }
        
        .card-emoji { font-size: 36px; margin-bottom: 10px; }
        .card-text { font-size: 13px; font-weight: 700; color: #666; }

        input { 
            width: 100%; padding: 15px 20px; border: 1px solid #f0f0f0; border-radius: 14px; 
            font-size: 15px; margin-bottom: 12px; background: #f9f9f9; color: var(--text-main);
        }
        input:focus { border-color: var(--accent-orange); background: white; outline: none; }
        
        .qty-row { display: flex; align-items: center; gap: 15px; margin-top: 10px; padding: 20px; background: #fafafa; border-radius: 18px; }
        .qty-btn { width: 35px; height: 35px; border: none; background: white; cursor: pointer; border-radius: 12px; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; }
        .qty-val { font-size: 18px; font-weight: 800; min-width: 40px; text-align: center; }

        .price-preview { background: #fdfaf7; border-radius: 18px; padding: 24px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; }

        .sidebar { background: white; border-radius: 24px; padding: 32px; box-shadow: var(--card-shadow); position: sticky; top: 100px; }
        .cart-item { background: #fdfdfd; padding: 18px; margin-bottom: 15px; border-radius: 16px; border: 1px solid #f5f5f5; }
        
        /* 按钮深色化 */
        .btn { width: 100%; border: none; padding: 18px; border-radius: 16px; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-add { background: var(--text-main); color: white; margin-top: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .btn-submit { background: #222; color: white; margin-top: 15px; }
        .btn:disabled { background: #e0e0e0; color: #bcbcbc; cursor: not-allowed; transform: none; box-shadow: none; }

        .checkbox-container { display: flex; align-items: center; gap: 12px; margin-top: 25px; font-size: 13px; color: #999; cursor: pointer; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size: 22px;">🏔️</span> <b id="brand-text">Quote System</b>
    </div>
    <div class="lang-bar" id="langs"></div>
</div>

<div class="main-layout">
    <div class="panel">
        <div class="section-container sec-info">
            <div class="section-title" id="t-info-label">CLIENT INFO</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="cust-name">
                <input type="text" id="cust-phone" inputmode="tel">
            </div>
            <input type="email" id="cust-email">
        </div>

        <div class="section-container sec-plan">
            <div class="section-title" id="t-plan-label">SERVICE PLAN</div>
            <div class="grid" id="cat-grid"></div>
        </div>

        <div class="section-container sec-type">
            <div class="section-title" id="t-type-label">IDENTITY</div>
            <div class="grid" id="seg-grid"></div>
        </div>

        <div id="item-section" style="display:none;" class="section-container sec-option">
            <div class="section-title" id="t-option-label">SELECTION</div>
            <div class="grid" id="item-grid"></div>
        </div>

        <div id="price-box" style="display:none; flex-direction: column;">
            <div class="qty-row">
                <span style="font-weight:800; font-size:12px; flex:1; color:#bbb;" id="t-qty-label">QUANTITY</span>
                <button class="qty-btn" onclick="updateQty(-1)">−</button>
                <span class="qty-val" id="qty-display">1</span>
                <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>
            <div class="price-preview">
                <span style="font-weight:800; font-size:13px; color:#bbb;" id="t-preview-label">ESTIMATED</span>
                <b id="preview-val" style="font-size:24px; color:var(--text-main);">--</b>
            </div>
        </div>

        <button class="btn btn-add" id="btn-add" onclick="addToCart()" disabled>+ ADD TO ESTIMATE</button>
    </div>

    <div class="sidebar">
        <div class="section-title" id="t-cart-title" style="margin-bottom:28px; font-size:16px; color:var(--text-main); border-bottom: 2px solid #f8f8f8; padding-bottom: 15px;">
            🛒 SUMMARY
        </div>
        <div id="cart-list"></div>
        <div id="empty-msg" style="text-align:center; padding:50px 0; color:#ddd; font-size:13px;">Waiting for selection...</div>
        
        <div id="summary-area" style="display:none;">
            <div class="summary" style="margin-top:20px;">
                <div class="summary-line"><span id="t-subtotal">Subtotal</span><span id="sum-sub" style="font-weight:700;">--</span></div>
                <div class="summary-line"><span>Tax (<span id="sum-tax-rate">0</span>%)</span><span id="sum-tax-amt" style="font-weight:700;">--</span></div>
                <div class="summary-line grand-total"><span id="t-total">Total</span><span id="sum-total">--</span></div>
            </div>
            <label class="checkbox-container">
                <input type="checkbox" id="agree-checkbox" onchange="toggleSubmitButton()">
                <span id="t-checkbox-label">Details confirmed.</span>
            </label>
            <button class="btn btn-submit" id="t-submit-btn" onclick="doSubmit()" disabled>GENERATE PDF</button>
        </div>
    </div>
</div>

<script>
    const API = "https://web-cpq-api-2-htbgcafubqgjc9hb.malaysiawest-01.azurewebsites.net/api.php";
    let db = { cpq: null, langs: null };
    let state = { lang: 'en', cat: null, seg: null, item: null, qty: 1 };
    let cart = [];

    async function init() {
        const t_now = Date.now();
        try {
            const [r1, r2] = await Promise.all([
                fetch(`${API}?type=cpq&t=${t_now}`),
                fetch(`${API}?type=langs&t=${t_now}`)
            ]);
            db.cpq = await r1.json(); 
            db.langs = await r2.json();
            state.lang = db.cpq.settings.langs[0];
            renderLangs(); 
            updateUI();
        } catch(e) { console.error("Data Load Error", e); }
    }

    function t(key, fb) { 
        return (db.langs && db.langs[key] && db.langs[key][state.lang]) ? db.langs[key][state.lang] : (fb || key); 
    }
    
    function createCardHTML(text, isActive, clickFn) {
        const emojiRegex = /^(\u00a9|\u00ae|[\u2000-\u3300]|\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff])/;
        let emoji = "✨"; let label = text;
        if (emojiRegex.test(text)) {
            const parts = text.split(' ');
            emoji = parts[0]; label = parts.slice(1).join(' ');
        }
        return `<div class="card ${isActive ? 'active' : ''}" onclick="${clickFn}"><div class="card-emoji">${emoji}</div><div class="card-text">${label}</div></div>`;
    }

    function renderLangs() { 
        document.getElementById('langs').innerHTML = db.cpq.settings.langs.map(l => 
            `<button class="lang-btn ${l===state.lang?'active':''}" onclick="changeLang('${l}')">${l.toUpperCase()}</button>`
        ).join(''); 
    }

    function changeLang(l) { state.lang = l; renderLangs(); updateUI(); renderCart(); }

    function updateUI() {
        if(!db.cpq) return;
        document.getElementById('brand-text').innerText = db.cpq.settings.brand_name;
        document.getElementById('t-info-label').innerText = t('UI_NAME_LABEL');
        document.getElementById('t-plan-label').innerText = t('UI_SELECT_PLAN');
        document.getElementById('t-type-label').innerText = t('UI_SELECT_TYPE');
        document.getElementById('t-option-label').innerText = t('UI_SELECT_OPTION');
        document.getElementById('cust-name').placeholder = t('UI_NAME_LABEL');
        document.getElementById('cust-phone').placeholder = t('UI_PHONE_LABEL');
        document.getElementById('cust-email').placeholder = t('UI_EMAIL_LABEL');
        document.getElementById('t-cart-title').innerText = t('UI_TITLE');
        document.getElementById('t-total').innerText = t('UI_TOTAL');
        document.getElementById('t-preview-label').innerText = t('UI_TOTAL');
        document.getElementById('t-submit-btn').innerText = t('UI_SUBMIT');
        document.getElementById('t-checkbox-label').innerText = t('UI_checkbox', 'Details confirmed.');
        
        const uiText = {
            en: { qty: "QUANTITY", add: "+ ADD TO ESTIMATE", empty: "Waiting for selection...", sub: "Subtotal", tax: "Tax" },
            cn: { qty: "选择数量", add: "+ 添加到预估", empty: "尚未选择服务", sub: "小计", tax: "税额" },
            ms: { qty: "KUANTITI", add: "+ TAMBAH KE ANGGARAN", empty: "Tiada perkhidmatan dipilih.", sub: "Subjumlah", tax: "Cukai" }
        };
        const langPack = uiText[state.lang] || uiText.en;
        document.getElementById('t-qty-label').innerText = langPack.qty;
        document.getElementById('btn-add').innerText = langPack.add;
        document.getElementById('empty-msg').innerText = langPack.empty;
        document.getElementById('t-subtotal').innerText = langPack.sub;
        document.getElementById('t-tax').innerText = langPack.tax;

        // 渲染产品 Grid
        document.getElementById('cat-grid').innerHTML = Object.values(db.cpq.catalog)
            .sort((a,b)=>a.sort-b.sort)
            .map(p => createCardHTML(t(p.i18n), state.cat === p.i18n, `select('cat', '${p.i18n}')`))
            .join('');

        const selectedProd = Object.values(db.cpq.catalog).find(p => p.i18n === state.cat);
        const segGrid = document.getElementById('seg-grid');
        if (state.cat && selectedProd) {
            segGrid.innerHTML = selectedProd.segments.map(s => createCardHTML(t(s), state.seg === s, `select('seg', '${s}')`)).join('');
        } else { 
            segGrid.innerHTML = `<div style="grid-column:1/-1; color:#eee; text-align:center; padding:20px;">Please select plan first</div>`; 
        }

        const itemSec = document.getElementById('item-section');
        if (state.cat && state.seg && selectedProd) {
            itemSec.style.display = 'block';
            document.getElementById('item-grid').innerHTML = Object.keys(selectedProd.items)
                .map(k => createCardHTML(k, state.item === k, `select('item', '${k}')`))
                .join('');
        } else { itemSec.style.display = 'none'; }

        const priceBox = document.getElementById('price-box');
        if (state.cat && state.seg && state.item && selectedProd) {
            priceBox.style.display = 'flex';
            const unitPrice = selectedProd.items[state.item];
            document.getElementById('preview-val').innerText = `${db.cpq.settings.currency} ${(unitPrice * state.qty).toLocaleString()}`;
            document.getElementById('btn-add').disabled = false;
        } else { 
            priceBox.style.display = 'none'; 
            document.getElementById('btn-add').disabled = true; 
        }
    }

    function select(type, val) { 
        state[type] = val; 
        if(type==='cat'){ state.seg=null; state.item=null; } 
        if(type==='seg'){ state.item=null; } 
        state.qty = 1; document.getElementById('qty-display').innerText = 1;
        updateUI(); 
    }

    function updateQty(val) {
        state.qty = Math.max(1, state.qty + val);
        document.getElementById('qty-display').innerText = state.qty;
        updateUI();
    }

    function addToCart() {
        const prod = Object.values(db.cpq.catalog).find(p => p.i18n === state.cat);
        const unitPrice = prod.items[state.item];
        const itemDesc = t(state.cat);
        const itemOpt = state.item;
        const itemSeg = t(state.seg);
        const existing = cart.find(i => i.desc === itemDesc && i.opt === itemOpt && i.seg === itemSeg);
        if (existing) {
            existing.qty += state.qty;
            existing.line_total = existing.unit_price * existing.qty;
        } else {
            cart.push({ id: Date.now(), desc: itemDesc, opt: itemOpt, seg: itemSeg, unit_price: unitPrice, qty: state.qty, line_total: unitPrice * state.qty });
        }
        state.qty = 1; document.getElementById('qty-display').innerText = 1;
        renderCart(); updateUI();
    }

    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); renderCart(); }
    function updateCartQty(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.qty = Math.max(1, item.qty + delta);
            item.line_total = item.unit_price * item.qty;
            renderCart();
        }
    }

    function toggleSubmitButton() {
        const checkbox = document.getElementById('agree-checkbox');
        document.getElementById('t-submit-btn').disabled = !checkbox.checked;
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const sumArea = document.getElementById('summary-area');
        const empty = document.getElementById('empty-msg');
        if (cart.length === 0) { 
            list.innerHTML = ""; sumArea.style.display = 'none'; empty.style.display = 'block'; 
            document.getElementById('agree-checkbox').checked = false;
            return; 
        }
        empty.style.display = 'none'; sumArea.style.display = 'block';
        const cur = db.cpq.settings.currency;
        
        list.innerHTML = cart.map(i => `
            <div class="cart-item">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <b style="font-size:14px; color:#333;">${i.desc}</b>
                        <div style="font-size:11px; color:#aaa; margin:4px 0 10px 0;">${i.opt} / ${i.seg}</div>
                    </div>
                    <button onclick="removeFromCart(${i.id})" style="border:none; background:none; color:#ddd; cursor:pointer; font-size:18px;">×</button>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:10px; background:#f4f4f4; padding:4px 10px; border-radius:10px;">
                        <button onclick="updateCartQty(${i.id}, -1)" style="border:none; background:none; cursor:pointer;">-</button>
                        <span style="font-size:13px; font-weight:bold;">${i.qty}</span>
                        <button onclick="updateCartQty(${i.id}, 1)" style="border:none; background:none; cursor:pointer;">+</button>
                    </div>
                    <span style="font-weight:800; color:var(--text-main);">${cur}${i.line_total.toLocaleString()}</span>
                </div>
            </div>
        `).join('');
        
        const sub = cart.reduce((a, i) => a + i.line_total, 0);
        const taxRate = parseFloat(db.cpq.settings.tax_rate) || 0;
        const taxAmt = sub * (taxRate / 100);
        document.getElementById('sum-sub').innerText = `${cur} ${sub.toLocaleString()}`;
        document.getElementById('sum-tax-rate').innerText = taxRate;
        document.getElementById('sum-tax-amt').innerText = `${cur} ${taxAmt.toLocaleString()}`;
        document.getElementById('sum-total').innerText = `${cur} ${(sub + taxAmt).toLocaleString()}`;
        toggleSubmitButton();
    }

    async function doSubmit() {
        const checkbox = document.getElementById('agree-checkbox');
        if(!checkbox.checked) return;
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        if(!name || !phone || cart.length === 0) return alert("Fill form first");
        const order = { 
            name, phone, email: document.getElementById('cust-email').value, 
            items: cart.map(i => ({ desc: `${i.desc} (${i.opt})`, seg: i.seg, unit_price: i.unit_price, qty: i.qty, line_total: i.line_total })), 
            subtotal: document.getElementById('sum-sub').innerText, tax: document.getElementById('sum-tax-amt').innerText, 
            price: document.getElementById('sum-total').innerText, status: "pending", date: new Date().toISOString() 
        };
        const win = window.open('', '_blank');
        win.document.write(`<h1>Quotation</h1><pre>${JSON.stringify(order, null, 2)}</pre><script>window.print();<\/script>`);
        await fetch(`${API}?type=orders`, { method: 'POST', body: JSON.stringify(order) });
        cart = []; checkbox.checked = false; renderCart(); window.scrollTo(0,0);
    }
    init();
</script>
</body>
</html>
